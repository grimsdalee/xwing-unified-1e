<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Pilot Token Editor</title>
  <link rel="stylesheet" href="editor.css">
</head>
<body>
<header>
  <div>
    <h1>Pilot Token Editor</h1>
    <p>Define the name and pilot-skill replacement areas for each generated First Edition token.</p>
  </div>
  <button id="download">Download completed editor plan</button>
</header>
<main>
  <aside>
    <input id="search" placeholder="Search pilot, ship or faction">
    <div id="pilotList"></div>
  </aside>
  <section id="workspace">
    <div id="summary"></div>
    <div class="editor-grid">
      <div class="viewer-panel">
        <div class="toolbar">
          <button id="zoomOut">−</button>
          <button id="zoomIn">+</button>
          <button id="fit">Fit</button>
          <button id="actual">100%</button>
          <span id="zoomLabel"></span>
        </div>
        <div id="viewport">
          <div id="stage">
            <img id="donor" alt="Donor token">
            <div id="nameOverlay" class="overlay name-overlay"></div>
            <div id="skillOverlay" class="overlay skill-overlay"></div>
          </div>
        </div>
        <p class="hint">Select <strong>Name</strong> or <strong>Skill</strong>, then drag on the image to define that rectangle. Drag an existing rectangle to move it.</p>
      </div>
      <div class="control-panel">
        <div class="reference">
          <h3>Pilot card reference</h3>
          <img id="card" alt="Pilot card">
          <p id="cardMissing" class="warning"></p>
        </div>
        <fieldset>
          <legend>Editing target</legend>
          <label><input type="radio" name="target" value="name" checked> Pilot name</label>
          <label><input type="radio" name="target" value="skill"> Pilot skill</label>
        </fieldset>
        <div id="regionControls"></div>
        <div id="styleControls"></div>
        <label>Status
          <select id="status">
            <option>NeedsLayout</option>
            <option>Approved</option>
          </select>
        </label>
        <label>Notes<textarea id="notes"></textarea></label>
      </div>
    </div>
  </section>
</main>
<script src="editor-data.js"></script>
<script src="editor.js"></script>
</body>
</html>
